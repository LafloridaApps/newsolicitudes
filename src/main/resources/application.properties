spring.application.name=newsolicitudes

server.port=9000

spring.datasource.url=jdbc:mysql://localhost:3306/solicitudes
spring.datasource.username=root
spring.datasource.password=Maga2025!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración HikariCP
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=90000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-1

# JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.newsolicitudes=DEBUG
logging.level.com.newsolicitudes.newsolicitudes.services.derivacioncreate=DEBUG


