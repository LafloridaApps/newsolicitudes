name: Docker CI New solicitudes

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Forzamos manualmente las minúsculas para evitar el error 'invalid tag'
          tags: |
            ghcr.io/lafloridaapps/new-solicitudes:latest
          labels: |
            org.opencontainers.image.title=new-solicitudes-container